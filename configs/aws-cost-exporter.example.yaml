# This minimal runnable configuration shows process and AWS client settings.
# Omitted Cost Explorer, cache, scheduler, and telemetry fields use safe defaults.
server:
  listen_address: ":8080"
  metrics_path: "/metrics"
  read_header_timeout: 5s
  read_timeout: 15s
  write_timeout: 30s
  idle_timeout: 60s
  shutdown_timeout: 15s
  max_in_flight: 20
  debug:
    enabled: false

log:
  level: info
  format: json
  add_source: false

aws:
  region: us-east-1
  profile: ""
  endpoint_url: ""
  request_timeout: 30s
  retry:
    max_attempts: 5
    base_delay: 1s
    max_backoff: 30s
  rate_limit:
    requests_per_second: 0.5
    burst: 1
