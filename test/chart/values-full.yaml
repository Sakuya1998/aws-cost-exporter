serviceMonitor:
  enabled: true
prometheusRule:
  enabled: true
networkPolicy:
  enabled: true
  kubeletCIDRs:
    - 10.0.0.0/8
podDisruptionBudget:
  enabled: true
config:
  secretEnvRefs:
    - envName: AWS_COST_EXPORTER_PAYER_PROD_EXTERNAL_ID
      secretName: aws-cost-exporter-external-ids
      secretKey: payer-prod
  data:
    server:
      debug:
        enabled: false
awsSharedConfig:
  existingSecret: aws-cost-exporter-shared-config
