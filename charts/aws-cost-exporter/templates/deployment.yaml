apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aws-cost-exporter.fullname" . }}
  labels:
    {{- include "aws-cost-exporter.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "aws-cost-exporter.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "aws-cost-exporter.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "aws-cost-exporter.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: aws-cost-exporter
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["--config", "/etc/aws-cost-exporter/config.yaml"]
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          {{- if or .Values.config.secretEnvRefs .Values.awsSharedConfig.existingSecret }}
          env:
            {{- if .Values.awsSharedConfig.existingSecret }}
            - name: AWS_SHARED_CREDENTIALS_FILE
              value: {{ printf "%s/credentials" .Values.awsSharedConfig.mountPath | quote }}
            - name: AWS_CONFIG_FILE
              value: {{ printf "%s/config" .Values.awsSharedConfig.mountPath | quote }}
            {{- end }}
            {{- range .Values.config.secretEnvRefs }}
            - name: {{ .envName | quote }}
              valueFrom:
                secretKeyRef:
                  name: {{ .secretName | quote }}
                  key: {{ .secretKey | quote }}
            {{- end }}
          {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            {{- omit .Values.livenessProbe "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            {{- omit .Values.readinessProbe "enabled" | toYaml | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/aws-cost-exporter/config.yaml
              subPath: config.yaml
              readOnly: true
            {{- if .Values.awsSharedConfig.existingSecret }}
            - name: aws-shared-config
              mountPath: {{ .Values.awsSharedConfig.mountPath | quote }}
              readOnly: true
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "aws-cost-exporter.configMapName" . }}
            items:
              - key: config.yaml
                path: config.yaml
        {{- if .Values.awsSharedConfig.existingSecret }}
        - name: aws-shared-config
          secret:
            secretName: {{ .Values.awsSharedConfig.existingSecret | quote }}
            items:
              - key: {{ .Values.awsSharedConfig.credentialsKey | quote }}
                path: credentials
              - key: {{ .Values.awsSharedConfig.configKey | quote }}
                path: config
        {{- end }}
