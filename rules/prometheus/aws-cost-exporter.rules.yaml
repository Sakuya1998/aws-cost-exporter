groups:
  - name: aws-cost-exporter.recording
    rules:
      - record: aws_cost:month_to_date:sum_by_currency
        expr: sum by (job, instance, target, currency) (aws_cost_month_to_date_amount)

      - record: aws_cost_exporter:max_cache_age_seconds
        expr: max by (job, instance, target) (aws_cost_exporter_cache_age_seconds)

  - name: aws-cost-exporter.alerts
    rules:
      - alert: AWSCostExporterDataStale
        expr: aws_cost_exporter:max_cache_age_seconds > 43200
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: AWS cost data has not refreshed for 12 hours
          description: The oldest collector cache for {{ $labels.instance }} exceeds 12 hours. Check Cost Explorer connectivity and scheduler health.

      - alert: AWSCostExporterCollectorDown
        expr: aws_cost_exporter_collector_up == 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: AWS Cost Exporter collector {{ $labels.target }}/{{ $labels.collector }} is down
          description: Collector {{ $labels.collector }} for target {{ $labels.target }} on {{ $labels.instance }} has been down continuously for 30 minutes.

      # Tune the threshold for large accounts with heavy pagination.
      - alert: AWSCostExplorerPaginationSpike
        expr: sum by (job, instance, target) (increase(aws_cost_exporter_pagination_pages_total[1h])) > 100
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Cost Explorer pagination rate is unusually high
          description: Pagination page reads on {{ $labels.instance }} exceed the deployment threshold. Review filters, max_pages, and account size.

      - alert: AWSCostExplorerThrottleSustained
        expr: sum by (job, instance, target) (rate(aws_cost_exporter_aws_api_requests_total{status="throttle"}[15m])) > 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Cost Explorer throttling is sustained
          description: Throttled Cost Explorer requests on {{ $labels.instance }} indicate quota pressure or overly aggressive refresh settings.

      - alert: AWSDailyCostSpike
        expr: aws_cost_daily_amount > 1.5 * avg_over_time(aws_cost_daily_amount[7d])
        for: 2h
        labels:
          severity: warning
        annotations:
          summary: Daily AWS cost spike for {{ $labels.target }} in {{ $labels.currency }}
          description: Current UTC billing-day cost exceeds 1.5 times its seven-day scrape-history average. Cost Explorer backfill can cause false positives.

      # Budget alert example only; intentionally disabled by default.
      # Replace both currency and threshold for the deployment.
      # The forecast interval includes today, so subtract today's MTD component.
      # - alert: AWSMonthlyCostForecastAboveBudget
      #   expr: >-
